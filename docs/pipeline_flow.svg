<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <linearGradient id="gPass1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#E3F2FD"/>
      <stop offset="1" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="gPass2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF3E0"/>
      <stop offset="1" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="gPlot" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F3E5F5"/>
      <stop offset="1" stop-color="#E1BEE7"/>
    </linearGradient>
  </defs>

  <text x="490" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#222">HDB 3D Wind Data Pipeline — Two-Pass Workflow</text>

  <!-- INPUT -->
  <rect x="40" y="70" width="200" height="64" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="140" y="98" text-anchor="middle" font-size="14" font-weight="700">case_*.npz corpus</text>
  <text x="140" y="118" text-anchor="middle" font-size="11" fill="#555">discover_npz() — recursive walk</text>

  <!-- main.py -->
  <rect x="290" y="70" width="200" height="64" rx="8" fill="#ECEFF1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="390" y="98" text-anchor="middle" font-size="14" font-weight="700">main.py --do plot pt</text>
  <text x="390" y="118" text-anchor="middle" font-size="11" fill="#555">argparse + mp.Pool(workers)</text>

  <line x1="240" y1="102" x2="290" y2="102" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Plotting branch -->
  <rect x="700" y="70" width="240" height="160" rx="10" fill="url(#gPlot)" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="820" y="98" text-anchor="middle" font-size="15" font-weight="700">Plotting (independent)</text>
  <text x="820" y="125" text-anchor="middle" font-size="12" fill="#333">eda1 — per-case descriptors</text>
  <text x="820" y="145" text-anchor="middle" font-size="12" fill="#333">11 PNGs + summary.txt</text>
  <line x1="710" y1="160" x2="930" y2="160" stroke="#8E24AA" stroke-dasharray="3 3"/>
  <text x="820" y="180" text-anchor="middle" font-size="12" fill="#333">eda2 — extract → plots</text>
  <text x="820" y="200" text-anchor="middle" font-size="11" fill="#555">tensor_data.npz (N,12)</text>
  <text x="820" y="218" text-anchor="middle" font-size="11" fill="#555">hist / overlay / scatter / profile</text>

  <line x1="490" y1="102" x2="700" y2="130" stroke="#8E24AA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PASS 1 -->
  <rect x="60" y="180" width="600" height="200" rx="10" fill="url(#gPass1)" stroke="#1976D2" stroke-width="1.5"/>
  <text x="360" y="208" text-anchor="middle" font-size="16" font-weight="700" fill="#0D47A1">Pass 1 — Streaming Statistics</text>

  <rect x="80" y="226" width="270" height="138" rx="6" fill="#FFFFFF" stroke="#1976D2"/>
  <text x="215" y="246" text-anchor="middle" font-size="12" font-weight="700">per-worker (mp.Pool)</text>
  <text x="92" y="266" font-size="11">1. load NPZ → _extract_raw</text>
  <text x="92" y="284" font-size="11">2. per-case consts (U_ref, L_scale)</text>
  <text x="92" y="302" font-size="11">3. bbox cut [-550,550]² × [0,160]</text>
  <text x="92" y="320" font-size="11">4. divergence check (raw |Uy|, |p_surf|)</text>
  <text x="92" y="338" font-size="11">5. physics: p_aero, Uy_residual, log_nut</text>
  <text x="92" y="356" font-size="11">6. mini-Welford → partial (n, mean, M2)</text>

  <rect x="370" y="226" width="270" height="138" rx="6" fill="#FFFFFF" stroke="#1976D2"/>
  <text x="505" y="246" text-anchor="middle" font-size="12" font-weight="700">main process</text>
  <text x="382" y="266" font-size="11">• Chan parallel merge of partials</text>
  <text x="382" y="284" font-size="11">• finalize global mean / std</text>
  <text x="382" y="302" font-size="11">• 3σ anomaly detection</text>
  <text x="382" y="324" font-size="11" font-weight="700" fill="#0D47A1">Artifacts on disk:</text>
  <text x="382" y="342" font-size="11">norm_stats.json · all_case_stats.json</text>
  <text x="382" y="358" font-size="11">diverged_cases.json · anomaly_cases.json</text>

  <line x1="360" y1="134" x2="360" y2="180" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PASS 2 -->
  <rect x="60" y="410" width="860" height="240" rx="10" fill="url(#gPass2)" stroke="#F57C00" stroke-width="1.5"/>
  <text x="490" y="438" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">Pass 2 — Per-Case PT Generation</text>

  <rect x="80" y="456" width="270" height="178" rx="6" fill="#FFFFFF" stroke="#F57C00"/>
  <text x="215" y="476" text-anchor="middle" font-size="12" font-weight="700">worker init</text>
  <text x="92" y="496" font-size="11">• load norm_stats (broadcast)</text>
  <text x="92" y="514" font-size="11">• build_grid_coords() ⟶ 524,288 pts</text>
  <text x="92" y="532" font-size="11">• pin OMP / MKL / torch = 1 thread</text>
  <text x="215" y="560" text-anchor="middle" font-size="12" font-weight="700">case loop</text>
  <text x="92" y="580" font-size="11">load → cut → physics</text>
  <text x="92" y="598" font-size="11">build SDFComputer (Open3D BVH)</text>
  <text x="92" y="616" font-size="11">2m shell (side walls + SDF/z filter)</text>

  <rect x="370" y="456" width="270" height="178" rx="6" fill="#FFFFFF" stroke="#F57C00"/>
  <text x="505" y="476" text-anchor="middle" font-size="12" font-weight="700">per-case computations</text>
  <text x="382" y="496" font-size="11">• IDW k=8: volume → shell fields</text>
  <text x="382" y="514" font-size="11">• SDF + grad on volume + shell</text>
  <text x="382" y="532" font-size="11">• SDF + grad on fixed grid</text>
  <text x="382" y="550" font-size="11">• concat volume ⊕ shell</text>
  <text x="382" y="568" font-size="11">• z-score with pass-1 stats</text>
  <text x="382" y="586" font-size="11">• is_shell_point flag</text>
  <text x="382" y="612" font-size="11" fill="#555">skips diverged · marks anomaly</text>

  <rect x="660" y="456" width="240" height="178" rx="6" fill="#FFFFFF" stroke="#F57C00"/>
  <text x="780" y="476" text-anchor="middle" font-size="12" font-weight="700">torch.save → &lt;case&gt;.pt</text>
  <text x="672" y="498" font-size="11">metadata · constants</text>
  <text x="672" y="516" font-size="11">STL geom (V, F)</text>
  <text x="672" y="534" font-size="11">surface (S, 4) z-scored</text>
  <text x="672" y="552" font-size="11">volume = cut + shell</text>
  <text x="672" y="570" font-size="11">  (Ntot, 5) z-scored</text>
  <text x="672" y="588" font-size="11">  SDF + grad + is_shell</text>
  <text x="672" y="606" font-size="11">grid SDF + grad (524k)</text>
  <text x="672" y="624" font-size="11" fill="#555">~150 MB per file</text>

  <line x1="360" y1="380" x2="360" y2="410" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="545" x2="370" y2="545" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="545" x2="660" y2="545" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- footer -->
  <text x="490" y="680" text-anchor="middle" font-size="11" fill="#666">cut box: X,Y ∈ [-550, 550] m  ·  Z ∈ [0, 160] m   |   grid: 128 × 128 × 32 (ij_zyx)   |   shell offset: 2 m, k=8 IDW</text>
</svg>
